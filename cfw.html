        /* Estilos base compatibles con PS3 */
        body {
            background-color: #6A18A5;
			background-image: url("bg.png");
			background-repeat: no-repeat;
			background-attachment: fixed;
			background-position: center;

            font-family: Arial, Helvetica, sans-serif;

        /* BANNER */
        .banner-container {
            width: 100%;
            margin: 0;
            padding: 0;
            background-color: #6A18A5;
            border-bottom: 4px solid #C78FEF;
        }
        
        .banner-container img {
            width: 100%;
            height: auto;
            display: block;
            border: none;
        }

        .container {
            width: 95%;
            margin: 20px auto;
        }

        /* MENU DE CATEGORIAS (100% del ancho) */
        table.categorias-menu {
            width: 100%;
            border-collapse: separate;
            border-spacing: 10px;
            margin-bottom: 30px;
        }

        .icono-cat {
            display: block;
            background-color: #481070;
            border: 2px solid #AC5AE7;
            padding: 15px 5px;
            color: #FFFFFF;
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
            font-size: 16px;
            text-align: center;
        }

        .icono-cat img {
            display: block;
            margin: 0 auto 10px auto;
            width: 128px;
            height: 128px;
            border: none;
        }

        .icono-cat.activo {
            border-color: #C78FEF;
            color: #FFFFFF;
            background-color: #6A18A5;
        }

        /* GRID DE DESCARGAS */
        .grid-descargas {
            text-align: center;
        }

        .item-descarga {
            display: inline-block;
            width: 170px;
            margin: 15px 20px;
            vertical-align: top;
            text-align: center;
            display: inline-block; 
        }

        .item-descarga a {
            text-decoration: none;
            color: #FFFFFF;
            display: block;
            outline: none;
        }

        .item-descarga img {
            width: 160px;
            height: 160px;
            border: 3px solid transparent;
            border-radius: 15px; 
            margin-bottom: 8px;
        }

        .item-descarga a:hover img {
            border-color: #C78FEF;
            background-color: #6A18A5;
        }

        .item-descarga span {
            display: block;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
